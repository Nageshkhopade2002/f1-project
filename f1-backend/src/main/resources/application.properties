spring.application.name=F1Hub
server.port=${PORT:8080}
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/f1hub?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
debug=${DEBUG:false}
server.error.include-message=always
server.error.include-binding-errors=${DEBUG:false}
server.error.include-stacktrace=${DEBUG:false}
logging.level.org.springframework=${LOG_LEVEL:INFO}
logging.level.com.f1hub=${LOG_LEVEL:INFO}
# ===== FILE UPLOAD SUPPORT =====
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===== RAZORPAY CONFIGURATION =====
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_SCDby0FyUYjR1q}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:VJKsHRT8PfMosufZ7CjRZ4Lg}


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Optional: Add logging to see CORS in action
logging.level.org.springframework.web.cors=DEBUG