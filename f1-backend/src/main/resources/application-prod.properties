spring.application.name=F1Hub

# Database Configuration - Use DATABASE_URL if available, otherwise individual vars
spring.datasource.url=${DATABASE_URL:jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:f1hub}?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Razorpay
razorpay.key.id=rzp_test_SCDby0FyUYjR1q
razorpay.key.secret=VJKsHRT8PfMosufZ7CjRZ4Lg

# Server
server.port=${PORT:8080}

# Logging
logging.level.org.springframework=INFO
logging.level.com.f1hub=INFO
