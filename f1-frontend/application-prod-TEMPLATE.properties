# REPLACE VALUES WITH YOUR RAILWAY CREDENTIALS

server.port=${PORT:8080}

# Database - REPLACE WITH YOUR RAILWAY VALUES
spring.datasource.url=jdbc:mysql://YOUR_MYSQL_HOST:YOUR_MYSQL_PORT/YOUR_MYSQL_DATABASE
spring.datasource.username=YOUR_MYSQL_USER
spring.datasource.password=YOUR_MYSQL_PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JWT - REPLACE WITH YOUR GENERATED SECRET
jwt.secret=YOUR_JWT_SECRET_HERE
jwt.expiration=86400000

# CORS - Will update after frontend deployment
allowed.origins=http://localhost:5173

# Logging
logging.level.root=INFO
